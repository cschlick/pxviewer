<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="/favicon.png" />
  <title>pxviewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    #header {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 12px; height: 48px;
      background: #1e1e1e; color: #fff;
      border-bottom: 1px solid #333;
    }
    #header h1 { font-size: 18px; margin: 0; }
    #header select, #header button {
      background: #2c2c2c; color: #fff; border: 1px solid #444;
      padding: 6px 10px; border-radius: 4px; font-size: 14px;
    }
    #header button { cursor: pointer; background: #0066cc; border-color: #0066cc; }
    #header button:hover { background: #005bb5; }
    #viewer {
      width: 100%; height: calc(100% - 48px);
      border: 0; background: #000;
    }
    #status { margin-left: auto; font-size: 12px; color: #aaa; }
  </style>
</head>
<body>
  <div id="header">
    <h1>pxviewer</h1>
    <select id="demo-select"><option value="">— choose a volume demo —</option></select>
    <button id="load-demo">Load</button>
    <span id="status"></span>
  </div>
  <iframe id="viewer" src="index.html"></iframe>

  <script type="module">
    const select = document.getElementById('demo-select');
    const status = document.getElementById('status');
    const viewer = document.getElementById('viewer');

    async function listDemos() {
      try {
        const res = await fetch('/api/volume-demos');
        if (!res.ok) throw new Error(res.statusText);
        const demos = await res.json();
        for (const { name, description } of demos) {
          const opt = document.createElement('option');
          opt.value = name;
          opt.textContent = `${name}: ${description}`;
          select.appendChild(opt);
        }
      } catch (err) {
        status.textContent = `Could not list demos: ${err.message}`;
      }
    }

    document.getElementById('load-demo').addEventListener('click', async () => {
      const name = select.value;
      if (!name) {
        status.textContent = 'Select a demo first.';
        return;
      }
      status.textContent = `Loading ${name}...`;
      try {
        const res = await fetch(`/api/volume-demo/${name}`);
        if (!res.ok) throw new Error(res.statusText);
        const data = await res.json();
        viewer.src = `index.html?mvsj=${encodeURIComponent(data.mvsj_url)}`;
        status.textContent = `Loaded ${name}`;
      } catch (err) {
        status.textContent = `Failed to load ${name}: ${err.message}`;
      }
    });

    listDemos();
  </script>
</body>
</html>
