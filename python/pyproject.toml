[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pxviewer"
version = "0.1.0"
description = "Python API for pxviewer"
requires-python = ">=3.10"
dependencies = [
    "molviewspec>=1.8.0",
    "ciftools>=0.2.0",
    "numpy>=1.23",
]

[project.optional-dependencies]
live = [
    "websockets>=12.0",
]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.23",
    "websockets>=12.0",
]

[tool.hatch.build.targets.wheel]
packages = ["pxviewer"]

[tool.pytest.ini_options]
testpaths = ["tests"]
