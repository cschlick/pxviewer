[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pxviewer"
version = "0.1.0"
description = "Python API for pxviewer"
requires-python = ">=3.10"
dependencies = [
    "molviewspec>=1.8.0",
    "ciftools>=0.2.0",
]

[tool.hatch.build.targets.wheel]
packages = ["pxviewer"]
