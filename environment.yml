# Conda environment for pxviewer.
#
# pxviewer reads atomic models through cctbx, which is only distributed on
# conda-forge (not PyPI) — so a conda env is the supported way to install.
#
#   conda env create -f environment.yml
#   conda activate pxviewer
#   ./scripts/setup_chem_data.sh                # monomer lib + validation caches
#   conda deactivate && conda activate pxviewer # pick up the hook it wrote
#   pip install -e ./python                     # the pxviewer package itself
#
# Note the numpy pin: cctbx currently supports numpy <= 2.4, so it is capped below
# 2.5.
#
# chem_data ships the monomer library (geostd + mon_lib) that minimization,
# tugging and validation build restraints from. It lives on cctbx's own
# anaconda.org channel, not conda-forge — a free community channel, not
# Anaconda's `defaults`, so no commercial ToS applies. It only carries the
# latest build. Installing it here means the restraints data comes with the
# env instead of a separately-managed geostd checkout; point
# MMTBX_CCP4_MONOMER_LIB at its geostd dir (see README) so cctbx finds it.
# qt6-webengine: PySide6 carries the Python bindings for QtWebEngine (the desktop
# app's Mol* viewport), but conda-forge splits the native Qt WebEngine module into
# its own package that pyside6 does not pull in — without it the viewport import
# fails with `libQt6WebEngineCore.so.6: cannot open shared object file`. conda
# matches its version to qt6-main, so no pin is needed.
#
# Every dependency is conda (conda-forge / chem_data), which is what makes the env
# reproducible across platforms — cctbx is conda-only to begin with. BinaryCIF for
# the browser is written by the in-tree pxviewer.bcif, which needs only msgpack
# (msgpack-python on conda-forge), so there is no pip: block at all.
name: pxviewer
channels:
  - conda-forge
  - chem_data
dependencies:
  - python=3.12
  - cctbx-base
  - chem_data
  - "numpy<2.5"
  - pyside6>=6.5
  - qt6-webengine
  - molviewspec>=1.8.0
  - msgpack-python>=1.0
  - websockets>=12.0
  - qtconsole>=5.5
  - ipykernel>=6.0
  - pytest>=7.0
  - pytest-asyncio>=0.23
  - pip
